<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Music Player</title>
<style>
:root {
  --primary: #00d2ff;
  --secondary: #3a7bd5;
  --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  --card-bg: rgba(255,255,255,.075);
  --text: #fff;
  --muted: #c7c7d4;
  --danger: #ff5c45;
  --success: #00ff87;
}

* { box-sizing: border-box; }
[hidden] { display: none !important; }

body {
  margin: 0;
  min-height: 100vh;
  padding: 24px;
  display: flex;
  justify-content: center;
  align-items: center;
  background: var(--bg-gradient);
  color: var(--text);
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
}

.main-layout {
  width: min(100%, 960px);
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr);
  gap: 20px;
  align-items: start;
}

.sidebar,
.player-container {
  background: var(--card-bg);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 22px;
  box-shadow: 0 12px 40px rgba(0,0,0,.35);
  backdrop-filter: blur(12px);
}

.sidebar { padding: 20px; }
.player-container {
  width: 100%;
  padding: clamp(22px, 4vw, 40px);
  text-align: center;
}

h3 {
  margin: 0 0 12px;
  color: var(--primary);
  font-size: 16px;
}

button,
.upload-btn,
.expand-btn {
  border: 0;
  color: #fff;
  cursor: pointer;
  font: inherit;
  transition: transform .18s, background .18s, box-shadow .18s;
}

button:hover,
.upload-btn:hover,
.expand-btn:hover {
  transform: translateY(-1px) scale(1.03);
}

button:disabled {
  opacity: .55;
  cursor: not-allowed;
  transform: none;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

button svg,
.expand-btn svg,
.upload-btn svg,
.drag-handle svg {
  width: 19px;
  height: 19px;
  display: block;
}

.expand-btn,
.upload-btn {
  min-height: 42px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  text-decoration: none;
  white-space: nowrap;
}

.sidebar .expand-btn,
.sidebar label {
  width: 100%;
  margin-bottom: 10px;
}

.upload-btn {
  padding: 12px 24px;
  margin: 0 auto 25px;
}

#file-upload,
#txt-upload { display: none; }

.album-cover-container {
  width: min(220px, 72vw);
  aspect-ratio: 1;
  margin: 0 auto 20px;
  border-radius: 16px;
  overflow: hidden;
  background: rgba(255,255,255,.07);
  box-shadow: 0 8px 25px rgba(0,0,0,.3);
}

.album-cover-container img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}

.song-details h2 {
  margin: 10px 0 5px;
  font-size: clamp(21px, 4vw, 26px);
  overflow-wrap: anywhere;
}

.song-details p {
  margin: 0 0 25px;
  color: var(--muted);
  overflow-wrap: anywhere;
}

.progress-area { margin-bottom: 25px; }

.progress-bar,
.volume-slider {
  width: 100%;
  height: 6px;
  appearance: none;
  -webkit-appearance: none;
  border-radius: 999px;
  background: rgba(255,255,255,.23);
  cursor: pointer;
}

.progress-bar::-webkit-slider-thumb,
.volume-slider::-webkit-slider-thumb {
  width: 15px;
  height: 15px;
  appearance: none;
  -webkit-appearance: none;
  border-radius: 50%;
  background: var(--primary);
  border: 2px solid #fff;
}

.time-direction {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
}

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  gap: 14px;
  margin-bottom: 16px;
}

.controls button {
  width: 50px;
  height: 50px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.controls #btn-play,
.controls #btn-pause {
  width: 62px;
  height: 62px;
}

.controls #btn-play svg,
.controls #btn-pause svg {
  width: 24px;
  height: 24px;
}

.shuffle-btn-svg.active,
#btn-sync-icon.active {
  background: var(--success);
  color: #08110d;
  box-shadow: 0 4px 18px rgba(0,255,135,.38);
}

.volume-area {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 25px;
  color: var(--muted);
}

.volume-slider {
  width: min(150px, 45vw);
  height: 5px;
}

.config-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-bottom: 25px;
  text-align: left;
  font-size: 14px;
}

.config-item {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}

.config-item input[type="number"] {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 999px;
  background: rgba(0,0,0,.22);
  color: #fff;
  outline: none;
}

.color-pickers {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
}

.color-pickers input {
  width: 100%;
  height: 38px;
  border: 1px solid rgba(255,255,255,.2);
  border-radius: 10px;
  background: transparent;
  cursor: pointer;
}

.playlist {
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,.13);
  text-align: left;
}

.playlist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 15px;
}

.playlist-title {
  display: flex;
  align-items: center;
  gap: 10px;
}

.view-modes {
  display: flex;
  gap: 6px;
}

.view-modes button {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  background: rgba(255,255,255,.1);
}

.view-modes button.active-view {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.bulk-menu {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,.06);
}

.bulk-menu button { flex: 1 1 135px; }
.selected-actions {
  display: flex;
  flex: 1 1 100%;
  gap: 10px;
  flex-wrap: wrap;
}

.selection-count {
  flex: 1 1 100%;
  color: var(--muted);
  font-size: 12px;
}

.danger-btn {
  background: rgba(255,92,69,.16);
  color: #ffd5ce;
  box-shadow: inset 0 0 0 1px rgba(255,92,69,.32);
}

.ul-playlist {
  list-style: none;
  padding: 0;
  margin: 0;
  max-height: 400px;
  overflow-y: auto;
}

.ul-playlist.list-layout .track-item {
  min-height: 58px;
  display: grid;
  grid-template-columns: auto auto minmax(0,1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,.045);
}

.ul-playlist.list-layout .track-grid-thumb { display: none; }

.ul-playlist.grid-layout {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(135px, 1fr));
  gap: 12px;
}

.ul-playlist.grid-layout .track-item {
  position: relative;
  display: grid;
  gap: 9px;
  padding: 12px;
  border-radius: 14px;
  background: rgba(255,255,255,.055);
  text-align: center;
}

.track-item {
  transition: background .18s, box-shadow .18s, opacity .18s;
}

.track-item.dragging { opacity: .45; }
.track-item.drag-over { box-shadow: inset 0 0 0 2px var(--success); }

.drag-handle {
  width: 30px;
  height: 30px;
  min-height: 30px;
  border-radius: 8px;
  background: rgba(255,255,255,.08);
  color: var(--muted);
  cursor: grab;
}

.drag-handle svg {
  width: 16px;
  height: 16px;
}

.drag-handle:active { cursor: grabbing; }

.ul-playlist.grid-layout .drag-handle {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 2;
}

.track-grid-thumb {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 10px;
  background: rgba(255,255,255,.06);
}

.track-item.active {
  background: rgba(255,255,255,.14);
  box-shadow: inset 4px 0 0 var(--primary);
}

.ul-playlist.grid-layout .track-item.active {
  box-shadow: inset 0 0 0 2px var(--primary);
}

.track-info {
  min-width: 0;
  cursor: pointer;
}

.track-name,
.track-artist {
  display: block;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.track-name {
  font-size: 14px;
  font-weight: 650;
}

.track-artist {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
}

.track-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.track-checkbox {
  width: 17px;
  height: 17px;
  cursor: pointer;
  accent-color: var(--primary);
}

.ul-playlist.grid-layout .track-checkbox {
  position: absolute;
  top: 16px;
  left: 16px;
  z-index: 2;
}

.icon-btn {
  width: 32px;
  height: 32px;
  display: inline-flex;
  justify-content: center;
  align-items: center;
  padding: 0;
  border-radius: 8px;
  background: transparent;
  color: var(--muted);
}

.icon-btn:hover {
  background: rgba(255,255,255,.12);
  color: #fff;
}

.icon-btn.delete:hover {
  background: rgba(255,92,69,.12);
  color: var(--danger);
}

.empty-playlist {
  grid-column: 1 / -1;
  padding: 18px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}

.playlist.fullscreen-mode {
  position: fixed;
  inset: 0;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  width: 100vw;
  height: 100vh;
  padding: clamp(18px, 4vw, 40px);
  overflow: hidden;
  border: 0;
  border-radius: 0;
  background: var(--bg-gradient);
}

.playlist.fullscreen-mode .ul-playlist {
  max-height: none;
  flex: 1;
  overflow-y: auto;
}

.playlist.fullscreen-mode .playlist-header {
  flex-shrink: 0;
}

.playlist.fullscreen-mode .bulk-menu {
  flex-shrink: 0;
}

.exit-fs-btn { display: none; }

.playlist.fullscreen-mode .exit-fs-btn {
  width: 40px;
  height: 40px;
  display: inline-flex;
  padding: 0;
  border-radius: 50%;
  background: var(--danger);
}

.modal {
  position: fixed;
  inset: 0;
  z-index: 3000;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background: rgba(0,0,0,.72);
  overflow-y: auto;
}

.modal-content {
  width: min(100%, 360px);
  padding: 24px;
  border-radius: 18px;
  background: #24243e;
  border: 1px solid rgba(255,255,255,.2);
  margin: auto;
}

.modal-content label {
  display: block;
  margin-top: 12px;
  font-size: 14px;
}

.modal-content input[type="text"],
.modal-content input[type="file"] {
  width: 100%;
  margin-top: 6px;
  color: #fff;
}

.modal-content input[type="text"] {
  padding: 9px 10px;
  border: 1px solid rgba(255,255,255,.22);
  border-radius: 8px;
  background: rgba(0,0,0,.25);
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 22px;
}

.storage-section {
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
}

.storage-section h4 {
  margin: 0 0 12px;
  font-size: 13px;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

.storage-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
  max-height: 200px;
  overflow-y: auto;
  padding: 8px;
  background: rgba(0,0,0,.2);
  border-radius: 8px;
}

.storage-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,.06);
  font-size: 12px;
  border: 1px solid rgba(255,255,255,.08);
  cursor: pointer;
}

.storage-item-name {
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.storage-item-info {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
  margin-left: 8px;
  color: var(--muted);
  font-size: 11px;
}

.storage-item-date {
  opacity: 0.7;
}

.storage-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.storage-actions button {
  font-size: 12px;
  padding: 8px 10px;
  border-radius: 6px;
}

.storage-actions .expand-btn {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  min-height: 36px;
}

.storage-actions .danger-btn {
  background: rgba(255,92,69,.16);
  color: #ffd5ce;
  box-shadow: inset 0 0 0 1px rgba(255,92,69,.32);
}

@media (max-width: 760px) {
  body { align-items: flex-start; padding: 14px; }
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { order: 2; }
  .player-container { order: 1; }
  .config-grid { grid-template-columns: 1fr; }
  .playlist-header { align-items: flex-start; flex-direction: column; }
  .view-modes { width: 100%; }
  .view-modes button { flex: 1; }
  .ul-playlist.list-layout .track-item { grid-template-columns: auto auto minmax(0,1fr); }
  .ul-playlist.list-layout .track-actions { grid-column: 3; }
}
</style>
</head>

<body>
<div class="main-layout">
  <aside class="sidebar">
    <h3>Playlist File</h3>
    <button class="expand-btn" id="btn-export"></button>
    <label for="txt-upload" class="expand-btn"></label>
    <input type="file" id="txt-upload" accept=".txt" />
    <button class="expand-btn" id="btn-sync-icon"></button>
    <button class="expand-btn" id="btn-fullscreen" title="Fullscreen playlist"></button>

    <div class="storage-section">
      <h4>🌐 Browser Storage</h4>
      <div class="storage-list" id="storage-list"></div>
      <div class="storage-actions">
        <button class="expand-btn" id="btn-save-storage"></button>
        <button class="expand-btn" id="btn-clear-storage" style="background: rgba(255,92,69,.16); color: #ffd5ce; box-shadow: inset 0 0 0 1px rgba(255,92,69,.32);"></button>
      </div>
    </div>
  </aside>

  <main class="player-container">
    <div class="album-cover-container">
      <img id="album-art" alt="Album cover" />
    </div>

    <div class="song-details">
      <h2 id="current-title">No track selected</h2>
      <p id="current-artist">Import a template or upload music</p>
    </div>

    <audio id="audio-element"></audio>

    <div class="progress-area">
      <input type="range" id="progress-bar" class="progress-bar" value="0" min="0" max="100" />
      <div class="time-direction">
        <span id="current-time">0:00</span>
        <span id="duration-time">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button id="btn-shuffle" class="shuffle-btn-svg" title="Shuffle mode"></button>
      <button id="btn-prev" title="Previous track"></button>
      <button id="btn-play" title="Play"></button>
      <button id="btn-pause" title="Pause" hidden></button>
      <button id="btn-next" title="Next track"></button>
    </div>

    <div class="volume-area">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
      </svg>
      <input type="range" id="volume-slider" class="volume-slider" value="1" min="0" max="1" step="0.05" />
    </div>

    <div class="config-grid">
      <div class="config-item">
        <label for="speed-input">Speed:</label>
        <input type="number" id="speed-input" value="1.0" min="0.25" max="3.0" step="0.05" />
      </div>

      <div class="config-item">
        <label>Background Colors:</label>
        <div class="color-pickers">
          <input type="color" id="color1" value="#0f0c29" />
          <input type="color" id="color2" value="#302b63" />
        </div>
      </div>
    </div>

    <label for="file-upload" class="upload-btn"></label>
    <input type="file" id="file-upload" accept="audio/*" multiple />

    <section class="playlist" id="playlist-element">
      <div class="playlist-header">
        <div class="playlist-title">
          <h3>Your Playlist</h3>
          <button class="expand-btn exit-fs-btn" id="btn-exit-fullscreen"></button>
        </div>

        <div class="view-modes">
          <button class="active-view" id="btn-view-list" title="Rows view"></button>
          <button id="btn-view-grid" title="Grid view"></button>
        </div>
      </div>

      <div class="bulk-menu">
        <button class="expand-btn" id="btn-select-all"></button>
        <span class="selection-count" id="selection-count"></span>
        <div class="selected-actions" id="selected-actions" hidden>
          <button class="expand-btn" id="btn-bulk-edit"></button>
          <button class="expand-btn danger-btn" id="btn-bulk-delete"></button>
        </div>
      </div>

      <ul class="ul-playlist list-layout" id="playlist-container"></ul>
    </section>
  </main>
</div>

<div class="modal" id="edit-modal">
  <div class="modal-content">
    <h3 id="modal-title">Edit Song</h3>
    <label for="edit-name">Song Title:</label>
    <input type="text" id="edit-name" />
    <label for="edit-artist">Artist / Author:</label>
    <input type="text" id="edit-artist" />
    <label for="edit-cover">Album Cover Image:</label>
    <input type="file" id="edit-cover" accept="image/*" />
    <div class="modal-actions">
      <button class="expand-btn" id="btn-modal-cancel"></button>
      <button class="expand-btn" id="btn-modal-save"></button>
    </div>
  </div>
</div>

<script>
function generateColorFromName(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    const char = name.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  const hue = Math.abs(hash % 360);
  const saturation = 60 + (Math.abs(hash) % 30);
  const lightness = 50 + (Math.abs(hash) % 20);
  return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
}

function createDefaultCover(sync = false, c1 = "#b3b3b3", c2 = "#b3b3b3", songName = "") {
  const defs = sync ? `<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>` : "";
  const stroke = sync ? "url(#g)" : "#b3b3b3";
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none">${defs}<rect width="24" height="24" rx="4" fill="#ffffff" fill-opacity="0.04"/><circle cx="12" cy="12" r="10" stroke="${stroke}" stroke-width="1.2"/><circle cx="12" cy="12" r="3" stroke="${stroke}" stroke-width="1.2"/><path d="M12 2v3M12 19v3" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round"/></svg>`;
  return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
}

let defaultCover = createDefaultCover(false);
let trackList = [];
let currentTrackIndex = -1;
let isShuffle = false;
let shufflePlayed = new Set();
let editingIndexes = [];
let currentLayout = "list-layout";
let selectedTrackIds = new Set();
let draggedTrackId = null;
let syncNameWithBackground = false;

const audio = document.getElementById("audio-element");
const playBtn = document.getElementById("btn-play");
const pauseBtn = document.getElementById("btn-pause");
const prevBtn = document.getElementById("btn-prev");
const nextBtn = document.getElementById("btn-next");
const shuffleBtn = document.getElementById("btn-shuffle");
const progressBar = document.getElementById("progress-bar");
const volumeSlider = document.getElementById("volume-slider");
const currentTimeTxt = document.getElementById("current-time");
const durationTimeTxt = document.getElementById("duration-time");
const playlistContainer = document.getElementById("playlist-container");
const fileUpload = document.getElementById("file-upload");
const txtUpload = document.getElementById("txt-upload");
const btnExport = document.getElementById("btn-export");
const btnSyncIcon = document.getElementById("btn-sync-icon");
const albumArt = document.getElementById("album-art");
const speedInput = document.getElementById("speed-input");
const color1 = document.getElementById("color1");
const color2 = document.getElementById("color2");
const playlistElement = document.getElementById("playlist-element");
const editModal = document.getElementById("edit-modal");
const editName = document.getElementById("edit-name");
const editArtist = document.getElementById("edit-artist");
const editCover = document.getElementById("edit-cover");
const listViewBtn = document.getElementById("btn-view-list");
const gridViewBtn = document.getElementById("btn-view-grid");
const selectAllBtn = document.getElementById("btn-select-all");

  element.title = label;
  element.setAttribute("aria-label", label);
}

function makeTrackId() {
  return crypto && crypto.randomUUID ? crypto.randomUUID() : `track-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function createTrack(data) {
  const usesDefaultCover = data.usesDefaultCover ?? !data.cover;
  return {
    id: data.id || makeTrackId(),
    name: data.name || "Untitled",
    artist: data.artist || "Unknown Artist",
    src: data.src || "",
    cover: data.cover || defaultCover,
    usesDefaultCover,
    file: data.file || null,
    fileName: data.fileName || data.file?.name || "",
    mime: data.mime || data.file?.type || ""
  };
}

function escapeHtml(value) {
  return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function safeFileName(value) {
  return String(value || "Untitled").replace(/[<>:"/\\|?*\x00-\x1F]/g, "_").replace(/\s+/g, " ").trim().slice(0, 90) || "Untitled";
}

// BROWSER STORAGE FUNCTIONS
function savePlaylistToStorage(name) {
  if (!name || !trackList.length) {
    alert("Cannot save empty playlist");
    return;
  }
  const key = STORAGE_PREFIX + name;
  const playlistData = {
    name,
    tracks: trackList.map(t => ({
      id: t.id,
      name: t.name,
      artist: t.artist,
      fileName: t.fileName,
      mime: t.mime,
    })),
    savedAt: new Date().toISOString(),
  };
  try {
    localStorage.setItem(key, JSON.stringify(playlistData));
    updateStorageList();
    alert(`Playlist "${name}" saved successfully!`);
  } catch (err) {
    alert("Failed to save playlist: " + err.message);
  }
}

function loadPlaylistFromStorage(name) {
  const key = STORAGE_PREFIX + name;
  try {
    const data = JSON.parse(localStorage.getItem(key));
    if (!data || !data.tracks) return;
    
    trackList = data.tracks.map(t => createTrack({
      id: t.id,
      name: t.name,
      artist: t.artist,
      fileName: t.fileName,
      mime: t.mime,
    }));
    
    currentTrackIndex = -1;
    renderPlaylist();
    resetPlayerUi(`Loaded: ${name}`);
    alert(`Playlist "${name}" loaded successfully!`);
  } catch (err) {
    alert("Failed to load playlist: " + err.message);
  }
}

function deletePlaylistFromStorage(name) {
  const key = STORAGE_PREFIX + name;
  localStorage.removeItem(key);
  updateStorageList();
}

function updateStorageList() {
  storageList.innerHTML = "";
  const keys = Object.keys(localStorage);
  const playlists = keys.filter(k => k.startsWith(STORAGE_PREFIX));
  
  if (playlists.length === 0) {
    storageList.innerHTML = '<div class="storage-item"><span class="storage-item-name">No saved playlists</span></div>';
    return;
  }
  
  playlists.forEach(key => {
    const name = key.replace(STORAGE_PREFIX, "");
    try {
      const data = JSON.parse(localStorage.getItem(key));
      const date = new Date(data.savedAt).toLocaleDateString();
      const trackCount = data.tracks?.length || 0;
      
      const item = document.createElement("div");
      item.className = "storage-item";
      item.innerHTML = `
        <span class="storage-item-name">${escapeHtml(name)}</span>
        <div class="storage-item-info">
          <span>${trackCount} tracks</span>
          <span class="storage-item-date">${date}</span>
        </div>
      `;
      
      item.addEventListener("click", () => loadPlaylistFromStorage(name));
      const deleteBtn = document.createElement("button");
      deleteBtn.className = "icon-btn delete";
      deleteBtn.innerHTML = ICONS.deleteIcon;
      deleteBtn.style.width = "24px";
      deleteBtn.style.height = "24px";
      deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (confirm(`Delete playlist "${name}"?`)) {
          deletePlaylistFromStorage(name);
        }
      });
      
      item.appendChild(deleteBtn);
      storageList.appendChild(item);
    } catch (err) {
      console.error("Error reading playlist:", err);
    }
  });
}

function clearAllStorage() {
  const keys = Object.keys(localStorage);
  const playlists = keys.filter(k => k.startsWith(STORAGE_PREFIX));
  
  if (playlists.length === 0) {
    alert("No saved playlists to clear");
    return;
  }
  
  if (confirm(`Delete all ${playlists.length} saved playlist(s)?`)) {
    playlists.forEach(key => localStorage.removeItem(key));
    updateStorageList();
    alert("All playlists cleared!");
  }
}

function setPlayingUi(isPlaying) {
  playBtn.hidden = isPlaying;
  pauseBtn.hidden = !isPlaying;
}

function resetPlayerUi(message = "Upload your audio files") {
  audio.pause();
  audio.removeAttribute("src");
  audio.load();
  currentTrackIndex = -1;
  document.getElementById("current-title").innerText = "No track selected";
  document.getElementById("current-artist").innerText = message;
  albumArt.src = defaultCover;
  progressBar.value = 0;
  currentTimeTxt.innerText = "0:00";
  durationTimeTxt.innerText = "0:00";
  setPlayingUi(false);
}

function updateDefaultCoverColors() {
  const oldDefault = defaultCover;
  defaultCover = createDefaultCover(false, color1.value, color2.value);
  trackList.forEach(track => {
    if (track.usesDefaultCover || track.cover === oldDefault) {
      track.cover = defaultCover;
      track.usesDefaultCover = true;
    }
  });
  if (currentTrackIndex === -1 || trackList[currentTrackIndex]?.usesDefaultCover) albumArt.src = defaultCover;
}

function updateBackground() {
  document.documentElement.style.setProperty('--bg-gradient', `linear-gradient(135deg, ${color1.value}, ${color2.value}, #24243e)`);
  if (syncNameWithBackground) {
    defaultCover = createDefaultCover(true, color1.value, color2.value);
    trackList.forEach(track => {
      if (track.usesDefaultCover) {
        track.cover = defaultCover;
      }
    });
    if (currentTrackIndex >= 0) {
      const track = trackList[currentTrackIndex];
      if (track?.usesDefaultCover) albumArt.src = track.cover;
    } else {
      albumArt.src = defaultCover;
    }
    renderPlaylist();
  } else {
    updateDefaultCoverColors();
  }
}

function formatTime(seconds) {
  if (!seconds || seconds < 0) return "0:00";
  const hrs = Math.floor(seconds / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  const secs = Math.floor(seconds % 60);
  return hrs > 0 ? `${hrs}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}` : `${mins}:${String(secs).padStart(2, '0')}`;
}

function setCurrentTrack(index) {
  if (index < 0 || index >= trackList.length) return;
  currentTrackIndex = index;
  const track = trackList[index];
  document.getElementById("current-title").innerText = track.name;
  document.getElementById("current-artist").innerText = track.artist;
  albumArt.src = track.cover;
  if (track.src) {
    audio.src = track.src;
    audio.load();
  }
  renderPlaylist();
}

function playTrack() {
  if (currentTrackIndex < 0 || !trackList.length) return;
  audio.play().catch(err => console.error("Play failed:", err));
  setPlayingUi(true);
}

function pauseTrack() {
  audio.pause();
  setPlayingUi(false);
}

function renderPlaylist() {
  playlistContainer.innerHTML = "";
  if (!trackList.length) {
    playlistContainer.innerHTML = '<li class="empty-playlist">No tracks in playlist</li>';
    return;
  }

  trackList.forEach((track, index) => {
    const li = document.createElement("li");
    li.className = "track-item";
    if (index === currentTrackIndex) li.classList.add("active");
    li.dataset.trackId = track.id;

    const dragHandle = document.createElement("div");
    dragHandle.className = "drag-handle";
    dragHandle.innerHTML = ICONS.move;

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "track-checkbox";
    checkbox.checked = selectedTrackIds.has(track.id);
    checkbox.addEventListener("change", () => {
      if (checkbox.checked) selectedTrackIds.add(track.id);
      else selectedTrackIds.delete(track.id);
      updateSelectionUI();
    });

    if (currentLayout === "grid-layout") {
      const thumb = document.createElement("img");
      thumb.src = track.cover;
      thumb.className = "track-grid-thumb";
      li.appendChild(dragHandle);
      li.appendChild(checkbox);
      li.appendChild(thumb);
    }

    const trackInfo = document.createElement("div");
    trackInfo.className = "track-info";
    trackInfo.innerHTML = `<span class="track-name">${escapeHtml(track.name)}</span><span class="track-artist">${escapeHtml(track.artist)}</span>`;
    trackInfo.addEventListener("click", () => setCurrentTrack(index));

    const actions = document.createElement("div");
    actions.className = "track-actions";

    if (currentLayout === "list-layout") {
      actions.appendChild(dragHandle);
      actions.appendChild(checkbox);
    }

    const editBtn = document.createElement("button");
    editBtn.className = "icon-btn";
    editBtn.innerHTML = ICONS.edit;
    editBtn.title = "Edit track";
    editBtn.addEventListener("click", () => openEditModal(index));
    actions.appendChild(editBtn);

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "icon-btn delete";
    deleteBtn.innerHTML = ICONS.deleteIcon;
    deleteBtn.title = "Delete track";
    deleteBtn.addEventListener("click", () => deleteTrack(index));
    actions.appendChild(deleteBtn);

    li.appendChild(trackInfo);
    if (currentLayout === "list-layout") li.appendChild(actions);
    else li.appendChild(actions);

    li.addEventListener("dragstart", () => {
      draggedTrackId = track.id;
      li.classList.add("dragging");
    });
    li.addEventListener("dragend", () => {
      li.classList.remove("dragging");
      draggedTrackId = null;
    });
    li.addEventListener("dragover", (e) => {
      e.preventDefault();
      li.classList.add("drag-over");
    });
    li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
    li.addEventListener("drop", () => {
      li.classList.remove("drag-over");
      if (draggedTrackId && draggedTrackId !== track.id) {
        const fromIdx = trackList.findIndex(t => t.id === draggedTrackId);
        const toIdx = index;
        [trackList[fromIdx], trackList[toIdx]] = [trackList[toIdx], trackList[fromIdx]];
        renderPlaylist();
      }
    });

    li.draggable = true;
    playlistContainer.appendChild(li);
  });
}

function deleteTrack(index) {
  if (confirm("Delete this track?")) {
    if (index === currentTrackIndex) resetPlayerUi();
    trackList.splice(index, 1);
    if (currentTrackIndex >= trackList.length) currentTrackIndex = trackList.length - 1;
    renderPlaylist();
  }
}

function openEditModal(index) {
  editingIndexes = [index];
  const track = trackList[index];
  editName.value = track.name;
  editArtist.value = track.artist;
  editModal.style.display = "flex";
}

function updateSelectionUI() {
  const count = selectedTrackIds.size;
  selectionCount.textContent = count > 0 ? `${count} selected` : "";
  selectedActions.hidden = count === 0;
  renderPlaylist();
}

// Initialize
applyStaticButtonIcons();
updateStorageList();

// Event listeners
playBtn.addEventListener("click", playTrack);
pauseBtn.addEventListener("click", pauseTrack);
shuffleBtn.addEventListener("click", () => {
  isShuffle = !isShuffle;
  shuffleBtn.classList.toggle("active", isShuffle);
  shufflePlayed.clear();
});

prevBtn.addEventListener("click", () => {
  if (currentTrackIndex > 0) setCurrentTrack(currentTrackIndex - 1);
  else if (trackList.length) setCurrentTrack(trackList.length - 1);
});

nextBtn.addEventListener("click", () => {
  if (!trackList.length) return;
  if (isShuffle) {
    if (shufflePlayed.size === trackList.length) shufflePlayed.clear();
    let idx;
    do { idx = Math.floor(Math.random() * trackList.length); }
    while (shufflePlayed.has(idx));
    shufflePlayed.add(idx);
    setCurrentTrack(idx);
  } else {
    setCurrentTrack(currentTrackIndex + 1 >= trackList.length ? 0 : currentTrackIndex + 1);
  }
});

audio.addEventListener("timeupdate", () => {
  const percent = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  progressBar.value = percent;
  currentTimeTxt.innerText = formatTime(audio.currentTime);
  durationTimeTxt.innerText = formatTime(audio.duration);
});

audio.addEventListener("ended", () => nextBtn.click());

progressBar.addEventListener("input", () => {
  if (audio.duration) audio.currentTime = (progressBar.value / 100) * audio.duration;
});

volumeSlider.addEventListener("input", () => { audio.volume = volumeSlider.value; });

speedInput.addEventListener("input", () => { audio.playbackRate = speedInput.value; });

color1.addEventListener("change", updateBackground);
color2.addEventListener("change", updateBackground);

btnSyncIcon.addEventListener("click", () => {
  syncNameWithBackground = !syncNameWithBackground;
  applyStaticButtonIcons();
  btnSyncIcon.classList.toggle("active", syncNameWithBackground);
  updateBackground();
});

fileUpload.addEventListener("change", (e) => {
  Array.from(e.target.files).forEach(file => {
    const url = URL.createObjectURL(file);
    const track = createTrack({ name: file.name.replace(/\.[^/.]+$/, ""), src: url, file });
    trackList.push(track);
  });
  renderPlaylist();
  fileUpload.value = "";
});

txtUpload.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const data = JSON.parse(evt.target.result);
      if (Array.isArray(data)) {
        trackList = data.map(t => createTrack(t));
        renderPlaylist();
      }
    } catch (err) {
      alert("Invalid playlist file");
    }
  };
  reader.readAsText(file);
  txtUpload.value = "";
});

btnExport.addEventListener("click", () => {
  if (!trackList.length) {
    alert("Playlist is empty");
    return;
  }
  const json = JSON.stringify(trackList, null, 2);
  const blob = new Blob([json], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `playlist-${Date.now()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("btn-save-storage").addEventListener("click", () => {
  const name = prompt("Enter playlist name:");
  if (name) savePlaylistToStorage(name);
});

document.getElementById("btn-clear-storage").addEventListener("click", clearAllStorage);

listViewBtn.addEventListener("click", () => {
  currentLayout = "list-layout";
  playlistContainer.className = "ul-playlist list-layout";
  listViewBtn.classList.add("active-view");
  gridViewBtn.classList.remove("active-view");
  renderPlaylist();
});

gridViewBtn.addEventListener("click", () => {
  currentLayout = "grid-layout";
  playlistContainer.className = "ul-playlist grid-layout";
  gridViewBtn.classList.add("active-view");
  listViewBtn.classList.remove("active-view");
  renderPlaylist();
});

selectAllBtn.addEventListener("click", () => {
  if (selectedTrackIds.size === trackList.length) {
    selectedTrackIds.clear();
  } else {
    trackList.forEach(t => selectedTrackIds.add(t.id));
  }
  updateSelectionUI();
});

document.getElementById("btn-bulk-edit").addEventListener("click", () => {
  editingIndexes = trackList
    .map((t, i) => selectedTrackIds.has(t.id) ? i : -1)
    .filter(i => i !== -1);
  if (editingIndexes.length > 0) openEditModal(editingIndexes[0]);
});

document.getElementById("btn-bulk-delete").addEventListener("click", () => {
  if (confirm("Delete selected tracks?")) {
    const indices = Array.from(selectedTrackIds).map(id => trackList.findIndex(t => t.id === id)).sort((a, b) => b - a);
    indices.forEach(i => trackList.splice(i, 1));
    selectedTrackIds.clear();
    updateSelectionUI();
    renderPlaylist();
  }
});

document.getElementById("btn-fullscreen").addEventListener("click", () => {
  playlistElement.classList.add("fullscreen-mode");
});

document.getElementById("btn-exit-fullscreen").addEventListener("click", () => {
  playlistElement.classList.remove("fullscreen-mode");
});

document.getElementById("btn-modal-cancel").addEventListener("click", () => {
  editModal.style.display = "none";
  editingIndexes = [];
});

document.getElementById("btn-modal-save").addEventListener("click", () => {
  editingIndexes.forEach(idx => {
    trackList[idx].name = editName.value || "Untitled";
    trackList[idx].artist = editArtist.value || "Unknown Artist";
  });
  editModal.style.display = "none";
  editingIndexes = [];
  renderPlaylist();
});

editCover.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file && editingIndexes.length > 0) {
    const reader = new FileReader();
    reader.onload = (evt) => {
      editingIndexes.forEach(idx => {
        trackList[idx].cover = evt.target.result;
        trackList[idx].usesDefaultCover = false;
      });
      renderPlaylist();
    };
    reader.readAsDataURL(file);
  }
});

editModal.addEventListener("click", (e) => {
  if (e.target === editModal) editModal.style.display = "none";
});
</script>
</body>
</html>
